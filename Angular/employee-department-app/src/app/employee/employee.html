<main class="flex flex-col items-center justify-center min-h-[100vh]">
    <h1 class="text-center text-4xl pb-4 font-bold">Employee</h1>
    <a class="underline text-neutral-600 pb-12" routerLink="/employee">switch route to Employee</a>
    <div class="grid grid-cols-2 gap-2 max-w-[50vw]">
        <section class="border p-2">
            <form (ngSubmit)="submitForm()" class="flex flex-col gap-4 w-fit">
                <div class="flex flex-col">
                    <label for="name">Name</label>
                    <input required class="border border-neutral-400 p-1 rounded-sm" [ngModel]="name()" (ngModelChange)="name.set($event)" type="text" name="name">
                </div>
                <div class="flex flex-col">
                    <label for="age">Age</label>
                    <input required class="border border-neutral-400 p-1 rounded-sm" [ngModel]="age()" (ngModelChange)="age.set($event)" type="number" name="age">
                </div>
                <div class="flex flex-col">
                    <label for="email">Email</label>
                    <input required class="border border-neutral-400 p-1 rounded-sm" [ngModel]="email()" (ngModelChange)="email.set($event)" type="text" name="email">
                </div>
                <button class="text-white bg-red-600 py-2 px-4 rounded-sm hover:shadow-md" type="submit">Submit</button>
            </form>
        </section>
        <section class="border p-2">
            <h1 class="text-center">Output</h1>
            <div [innerHTML]="output"></div>
        </section>
    </div>
</main>
