<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find A User</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-dark">
        <div class="container">
            <div class="d-flex align-items-center">
                <i class="bi bi-camera text-white" style="width: 30px;"></i>
                <a class="navbar-brand text-white" href="#">Album</a>
            </div>
            
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            </button>
        </div>
        
    </nav>

    <div class="container py-5">
        <div class="d-flex flex-column align-items-center">
            <h2 class="text-center pt-4">Album example</h4>
            <p class="text-center mt-4 pl-4 pr-4 w-75 text-secondary">
                Something short and leading about the collection below--its contents, the creator, etc. Make it short and sweet, but not too short so folks don't simply skip over it entirely.
            </p>
        </div>
        
        <div class="d-flex gap-2 mt-5 justify-content-center">
            <button class="btn btn-primary w-25">Main call to action</button>
            <button class="btn btn-secondary w-25">Secondary action</button>
        </div>
      
    </div>

    <div class="container mt-6">
        <div id="user-cards" class="row row-cols-3 g-4"></div>
    </div>
    <div class="container mt-6 mb-6">
        <ul id="pagination" class="pagination justify-content-end"></ul>
    </div>
    

    <script src="./script.js"></script>
 
</body>
</html>
